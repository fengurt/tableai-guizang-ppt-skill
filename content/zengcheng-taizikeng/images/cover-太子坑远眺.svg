<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F3F4"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A88B52"/>
      <stop offset="1" stop-color="#C9A86B"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="1180" cy="220" r="90" fill="url(#gold)" opacity="0.85"/>
  <!-- Far mountain -->
  <path d="M 0 560 L 200 380 L 380 470 L 540 360 L 720 480 L 880 350 L 1080 460 L 1240 380 L 1400 470 L 1600 400 L 1600 900 L 0 900 Z" fill="#0A1626" opacity="0.18"/>
  <!-- Mid mountain -->
  <path d="M 0 640 L 180 520 L 320 600 L 480 510 L 640 600 L 800 520 L 980 600 L 1140 520 L 1320 590 L 1480 530 L 1600 600 L 1600 900 L 0 900 Z" fill="#0A1626" opacity="0.34"/>
  <!-- Front tree line (abstract 太子坑 silhouette) -->
  <g fill="#0A1626">
    <ellipse cx="120" cy="730" rx="50" ry="80"/>
    <ellipse cx="180" cy="700" rx="40" ry="60"/>
    <rect x="115" y="730" width="6" height="60"/>
    <rect x="175" y="690" width="5" height="100"/>
    <ellipse cx="1500" cy="720" rx="80" ry="100"/>
    <ellipse cx="1420" cy="740" rx="55" ry="70"/>
    <rect x="1495" y="720" width="8" height="80"/>
    <rect x="1417" y="735" width="5" height="60"/>
  </g>
  <!-- Forest floor (faint) -->
  <line x1="0" y1="780" x2="1600" y2="780" stroke="#0A1626" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="820" x2="1600" y2="820" stroke="#0A1626" stroke-width="1" opacity="0.08"/>
  <!-- Chinese title overlay -->
  <text x="80" y="100" font-family="Songti SC, STSong, serif" font-size="48" font-weight="600" fill="#0A1626" letter-spacing="6">太子坑</text>
  <text x="80" y="160" font-family="Songti SC, STSong, serif" font-size="32" font-weight="400" fill="#A88B52" letter-spacing="4">沉香森林 · 静待知音</text>
  <line x1="80" y1="180" x2="220" y2="180" stroke="#A88B52" stroke-width="2"/>
</svg>

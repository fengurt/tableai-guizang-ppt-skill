<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <rect width="400" height="240" fill="#FFFFFF"/>
  <!-- Logo mark: stylized "S" connected nodes (network) -->
  <g transform="translate(40,40)">
    <circle cx="20" cy="20" r="10" fill="#0A1626"/>
    <circle cx="60" cy="60" r="10" fill="#0A1626"/>
    <circle cx="100" cy="20" r="10" fill="#A88B52"/>
    <circle cx="100" cy="100" r="10" fill="#0A1626"/>
    <circle cx="140" cy="60" r="10" fill="#A88B52"/>
    <line x1="20" y1="20" x2="60" y2="60" stroke="#75777D" stroke-width="2"/>
    <line x1="60" y1="60" x2="100" y2="20" stroke="#A88B52" stroke-width="2"/>
    <line x1="60" y1="60" x2="100" y2="100" stroke="#75777D" stroke-width="2"/>
    <line x1="100" y1="20" x2="140" y2="60" stroke="#A88B52" stroke-width="2"/>
    <line x1="100" y1="100" x2="140" y2="60" stroke="#75777D" stroke-width="2"/>
  </g>
  <!-- Wordmark -->
  <text x="200" y="100" font-family="var(--sans-tab)" font-size="36" font-weight="700" fill="#0A1626" letter-spacing="2">顺科智连</text>
  <text x="200" y="130" font-family="var(--sans-tab)" font-size="11" font-weight="500" fill="#A88B52" letter-spacing="0.2em">SHUNKÉ · SMART CONNECT</text>
  <text x="200" y="160" font-family="var(--sans-tab)" font-size="10" fill="#75777D">技术股份有限公司</text>
</svg>

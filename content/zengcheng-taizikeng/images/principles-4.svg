<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <rect width="1200" height="600" fill="#FFFFFF"/>
  <text x="600" y="60" text-anchor="middle" font-family="var(--sans-tab)" font-size="16" font-weight="700" fill="#0A1626" letter-spacing="0.18em">FOUR PRINCIPLES · 四原则</text>
  <text x="600" y="84" text-anchor="middle" font-family="var(--sans-tab)" font-size="11" fill="#75777D">项目判断的四个底层原则</text>
  <g font-family="var(--sans-tab)">
    <g transform="translate(300,300)">
      <circle r="60" fill="#A88B52"/>
      <text y="-12" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">P1</text>
      <text y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">真实需求</text>
      <text y="30" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.7">CAPTIVE</text>
      <text y="-85" text-anchor="middle" font-size="12" font-weight="700" fill="#0A1626">业主自有需求</text>
      <text y="-68" text-anchor="middle" font-size="9" fill="#44474C">PRINCIPLE 01</text>
    </g>
    <g transform="translate(600,300)">
      <circle r="60" fill="#0A1626"/>
      <text y="-12" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">P2</text>
      <text y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">复合</text>
      <text y="30" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.7">HYBRID</text>
      <text y="-85" text-anchor="middle" font-size="12" font-weight="700" fill="#0A1626">非单一业态</text>
      <text y="-68" text-anchor="middle" font-size="9" fill="#44474C">PRINCIPLE 02</text>
    </g>
    <g transform="translate(900,300)">
      <circle r="60" fill="#44474C"/>
      <text y="-12" text-anchor="middle" font-size="32" font-weight="700" fill="#FFFFFF">P3</text>
      <text y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">合规</text>
      <text y="30" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.7">COMPLIANT</text>
      <text y="-85" text-anchor="middle" font-size="12" font-weight="700" fill="#0A1626">点状供地 + 农文旅</text>
      <text y="-68" text-anchor="middle" font-size="9" fill="#44474C">PRINCIPLE 03</text>
    </g>
    <g transform="translate(450,500)">
      <circle r="50" fill="#C9A86B"/>
      <text y="-8" text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF">P4</text>
      <text y="10" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">克制</text>
      <text y="-72" text-anchor="middle" font-size="12" font-weight="700" fill="#0A1626">小而强 + 分期</text>
      <text y="80" text-anchor="middle" font-size="10" font-weight="600" fill="#0A1626">PRINCIPLE 04 · PRUDENT</text>
    </g>
    <g transform="translate(750,500)">
      <circle r="50" fill="#75777D"/>
      <text y="-8" text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF">P5</text>
      <text y="10" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">低密度</text>
      <text y="-72" text-anchor="middle" font-size="12" font-weight="700" fill="#0A1626">300 亩森林 + 90 房</text>
      <text y="80" text-anchor="middle" font-size="10" font-weight="600" fill="#0A1626">PRINCIPLE 05 · LOW-DENSITY</text>
    </g>
  </g>
</svg>

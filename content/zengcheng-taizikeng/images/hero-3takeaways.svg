<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#FFFFFF"/>
  <rect width="1200" height="700" fill="url(#noise)"/>
  <defs>
    <pattern id="noise" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#0A1626" opacity="0.08"/>
    </pattern>
  </defs>
  <!-- Left: big stat -->
  <g transform="translate(280,350)" font-family="var(--sans-tab)" text-anchor="middle">
    <text y="-100" font-size="13" font-weight="600" fill="#A88B52" letter-spacing="0.18em">PROJECT SIGNAL</text>
    <line x1="-60" y1="-86" x2="60" y2="-86" stroke="#A88B52" stroke-width="2"/>
    <text y="0" font-size="120" font-weight="700" fill="#0A1626" letter-spacing="-0.04em">30</text>
    <text y="50" font-size="14" font-weight="600" fill="#44474C">亩 · 点状供地上限</text>
    <text y="74" font-size="11" fill="#75777D">PROJECT MAX LAND USE</text>
    <text y="120" font-size="11" font-weight="600" fill="#A88B52">↓ COMPLIANCE BOUNDARY</text>
  </g>
  <!-- Right: 3 takeaways -->
  <g font-family="var(--sans-tab)" transform="translate(700,180)">
    <g transform="translate(0,0)">
      <rect width="380" height="100" fill="#A88B52" fill-opacity="0.10" stroke="#A88B52" stroke-width="2" stroke-dasharray="3 2"/>
      <text x="14" y="30" font-size="11" font-weight="700" fill="#A88B52" letter-spacing="0.16em">C1 · 真实需求</text>
      <text x="14" y="56" font-size="13" font-weight="600" fill="#0A1626">业主每年 5,000 房晚</text>
      <text x="14" y="76" font-size="11" fill="#44474C">~ 占稳定期 25%</text>
    </g>
    <g transform="translate(0,130)">
      <rect width="380" height="100" fill="#0A1626" fill-opacity="0.04" stroke="#0A1626" stroke-width="2"/>
      <text x="14" y="30" font-size="11" font-weight="700" fill="#0A1626" letter-spacing="0.16em">C2 · 复合场景</text>
      <text x="14" y="56" font-size="13" font-weight="600" fill="#0A1626">多业态 7 收入线</text>
      <text x="14" y="76" font-size="11" fill="#44474C">~ 占 GOP 85%</text>
    </g>
    <g transform="translate(0,260)">
      <rect width="380" height="100" fill="#C9A86B" fill-opacity="0.08" stroke="#C9A86B" stroke-width="2"/>
      <text x="14" y="30" font-size="11" font-weight="700" fill="#C9A86B" letter-spacing="0.16em">C3 · 克制密度</text>
      <text x="14" y="56" font-size="13" font-weight="600" fill="#0A1626">90 房 / 700 亩</text>
      <text x="14" y="76" font-size="11" fill="#44474C">~ 0.13 房 / 亩</text>
    </g>
  </g>
  <text x="600" y="640" text-anchor="middle" font-family="var(--sans-tab)" font-size="11" font-weight="600" fill="#0A1626" letter-spacing="0.18em">项目信号 · 30 亩 / 5000 房晚 / 7 业态</text>
</svg>

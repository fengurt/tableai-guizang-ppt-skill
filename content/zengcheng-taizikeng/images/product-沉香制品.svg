<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <rect width="1200" height="600" fill="#FFFFFF"/>
  <text x="600" y="50" text-anchor="middle" font-family="var(--sans-tab)" font-size="16" font-weight="700" fill="#0A1626" letter-spacing="0.18em">AGARWOOD PRODUCTS · 沉香制品矩阵</text>
  <text x="600" y="72" text-anchor="middle" font-family="var(--sans-tab)" font-size="10" fill="#75777D">二产衍生: 30+ SKU · 文化体验 + 礼赠 + 大健康</text>
  <g font-family="var(--sans-tab)">
    <!-- Card 1: 线香 (incense sticks) -->
    <g transform="translate(200,300)">
      <rect x="-90" y="-90" width="180" height="180" fill="#F5F3F4" stroke="#0A1626"/>
      <line x1="-50" y1="-30" x2="50" y2="-30" stroke="#A88B52" stroke-width="3"/>
      <line x1="-50" y1="0" x2="50" y2="0" stroke="#A88B52" stroke-width="3"/>
      <line x1="-50" y1="30" x2="50" y2="30" stroke="#A88B52" stroke-width="3"/>
      <line x1="-50" y1="60" x2="50" y2="60" stroke="#A88B52" stroke-width="3"/>
      <text y="-105" text-anchor="middle" font-size="13" font-weight="700" fill="#0A1626">线香</text>
      <text y="115" text-anchor="middle" font-size="10" fill="#44474C">INCENSE STICKS</text>
      <text y="130" text-anchor="middle" font-size="9" fill="#75777D">¥ 80-300 / 盒</text>
    </g>
    <!-- Card 2: 精油 (essential oil) -->
    <g transform="translate(420,300)">
      <rect x="-90" y="-90" width="180" height="180" fill="#F5F3F4" stroke="#0A1626"/>
      <circle cx="0" cy="0" r="35" fill="#C9A86B"/>
      <rect x="-5" y="20" width="10" height="50" fill="#0A1626"/>
      <text y="-105" text-anchor="middle" font-size="13" font-weight="700" fill="#0A1626">精油</text>
      <text y="115" text-anchor="middle" font-size="10" fill="#44474C">ESSENTIAL OIL</text>
      <text y="130" text-anchor="middle" font-size="9" fill="#75777D">¥ 480-1,200 / 5ml</text>
    </g>
    <!-- Card 3: 茶席 (tea ceremony) -->
    <g transform="translate(640,300)">
      <rect x="-90" y="-90" width="180" height="180" fill="#F5F3F4" stroke="#0A1626"/>
      <ellipse cx="0" cy="0" rx="50" ry="20" fill="#0A1626"/>
      <ellipse cx="0" cy="0" rx="40" ry="14" fill="#A88B52"/>
      <line x1="-30" y1="0" x2="30" y2="0" stroke="#44474C" stroke-width="2"/>
      <text y="-105" text-anchor="middle" font-size="13" font-weight="700" fill="#0A1626">沉香茶</text>
      <text y="115" text-anchor="middle" font-size="10" fill="#44474C">AGARWOOD TEA</text>
      <text y="130" text-anchor="middle" font-size="9" fill="#75777D">¥ 280-680 / 罐</text>
    </g>
    <!-- Card 4: 文创 (cultural product) -->
    <g transform="translate(860,300)">
      <rect x="-90" y="-90" width="180" height="180" fill="#F5F3F4" stroke="#0A1626"/>
      <rect x="-40" y="-50" width="80" height="60" fill="#0A1626"/>
      <rect x="-35" y="-45" width="70" height="50" fill="#A88B52"/>
      <text x="0" y="-10" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">·</text>
      <text y="-105" text-anchor="middle" font-size="13" font-weight="700" fill="#0A1626">文创礼盒</text>
      <text y="115" text-anchor="middle" font-size="10" fill="#44474C">GIFT BOX</text>
      <text y="130" text-anchor="middle" font-size="9" fill="#75777D">¥ 380-2,800 / 套</text>
    </g>
    <!-- Card 5: 雕件 (carvings) -->
    <g transform="translate(1080,300)">
      <rect x="-90" y="-90" width="180" height="180" fill="#F5F3F4" stroke="#0A1626"/>
      <path d="M -40 -40 Q -20 -60 0 -40 Q 20 -60 40 -40 L 30 40 L -30 40 Z" fill="#A88B52"/>
      <circle cx="0" cy="0" r="8" fill="#0A1626"/>
      <text y="-105" text-anchor="middle" font-size="13" font-weight="700" fill="#0A1626">雕件</text>
      <text y="115" text-anchor="middle" font-size="10" fill="#44474C">CARVINGS</text>
      <text y="130" text-anchor="middle" font-size="9" fill="#75777D">¥ 1,200-15,000+</text>
    </g>
  </g>
  <text x="600" y="490" text-anchor="middle" font-family="var(--sans-tab)" font-size="11" font-weight="600" fill="#0A1626" letter-spacing="0.18em">30+ SKU · 30% 零售毛利 · 企业礼赠 + 个人体验</text>
  <text x="600" y="510" text-anchor="middle" font-family="var(--sans-tab)" font-size="10" fill="#75777D">零售 3% / 收入 · 但 30% 毛利</text>
</svg>

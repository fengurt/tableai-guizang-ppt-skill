<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700">
  <rect width="800" height="700" fill="#FFFFFF"/>
  <text x="400" y="50" text-anchor="middle" font-family="var(--sans-tab)" font-size="16" font-weight="700" fill="#0A1626" letter-spacing="0.18em">REVENUE MIX · 收入结构</text>
  <text x="400" y="72" text-anchor="middle" font-family="var(--sans-tab)" font-size="10" fill="#75777D">稳定期基准情景 · 7 项收入</text>
  <!-- Donut chart (centered at 400, 350) -->
  <g transform="translate(400, 350)">
    <!-- 客房 30% (top-right) -->
    <path d="M 0 -150 A 150 150 0 0 1 142.66 -46.35 L 71.33 -23.18 A 75 75 0 0 0 0 -75 Z" fill="#0A1626"/>
    <!-- 餐饮 25% (right) -->
    <path d="M 142.66 -46.35 A 150 150 0 0 1 117.13 94.16 L 58.56 47.08 A 75 75 0 0 0 71.33 -23.18 Z" fill="#44474C"/>
    <!-- 会议 15% (bottom-right) -->
    <path d="M 117.13 94.16 A 150 150 0 0 1 -25.65 147.80 L -12.82 73.90 A 75 75 0 0 0 58.56 47.08 Z" fill="#A88B52"/>
    <!-- 康养 15% (bottom) -->
    <path d="M -25.65 147.80 A 150 150 0 0 1 -130.66 71.30 L -65.33 35.65 A 75 75 0 0 0 -12.82 73.90 Z" fill="#C9A86B"/>
    <!-- 学院 10% (bottom-left) -->
    <path d="M -130.66 71.30 A 150 150 0 0 1 -117.13 -94.16 L -58.56 -47.08 A 75 75 0 0 0 -65.33 35.65 Z" fill="#75777D"/>
    <!-- 零售 3% (left) -->
    <path d="M -117.13 -94.16 A 150 150 0 0 1 0 -150 L 0 -75 A 75 75 0 0 0 -58.56 -47.08 Z" fill="#DCD9DB"/>
    <!-- 其他 2% (top-left) -->
    <path d="M 0 -150 A 150 150 0 0 1 142.66 -46.35 L 71.33 -23.18 A 75 75 0 0 0 0 -75 Z" fill="#0A1626"/>
    <text y="-10" text-anchor="middle" font-family="var(--sans-tab)" font-size="42" font-weight="700" fill="#0A1626">¥6M+</text>
    <text y="22" text-anchor="middle" font-family="var(--sans-tab)" font-size="11" font-weight="600" fill="#A88B52">稳定期年收入</text>
  </g>
  <!-- Legend -->
  <g font-family="var(--sans-tab)" font-size="11">
    <g transform="translate(600,200)">
      <rect x="0" y="0" width="14" height="14" fill="#0A1626"/>
      <text x="22" y="11" fill="#0A1626">客房 · Rooms</text>
      <text x="22" y="26" font-size="9" fill="#75777D">30% · ~¥2.0M</text>
    </g>
    <g transform="translate(600,240)">
      <rect x="0" y="0" width="14" height="14" fill="#44474C"/>
      <text x="22" y="11" fill="#0A1626">餐饮 · F&amp;B</text>
      <text x="22" y="26" font-size="9" fill="#75777D">25% · ~¥1.5M</text>
    </g>
    <g transform="translate(600,280)">
      <rect x="0" y="0" width="14" height="14" fill="#A88B52"/>
      <text x="22" y="11" fill="#0A1626">会议 · Events</text>
      <text x="22" y="26" font-size="9" fill="#75777D">15% · ~¥0.9M</text>
    </g>
    <g transform="translate(600,320)">
      <rect x="0" y="0" width="14" height="14" fill="#C9A86B"/>
      <text x="22" y="11" fill="#0A1626">康养 · Wellness</text>
      <text x="22" y="26" font-size="9" fill="#75777D">15% · ~¥0.9M</text>
    </g>
    <g transform="translate(600,360)">
      <rect x="0" y="0" width="14" height="14" fill="#75777D"/>
      <text x="22" y="11" fill="#0A1626">学院 · Academy</text>
      <text x="22" y="26" font-size="9" fill="#75777D">10% · ~¥0.6M</text>
    </g>
    <g transform="translate(600,400)">
      <rect x="0" y="0" width="14" height="14" fill="#DCD9DB"/>
      <text x="22" y="11" fill="#0A1626">零售 · Retail</text>
      <text x="22" y="26" font-size="9" fill="#75777D">3% · ~¥0.2M</text>
    </g>
    <g transform="translate(600,440)">
      <rect x="0" y="0" width="14" height="14" fill="#0A1626"/>
      <text x="22" y="11" fill="#0A1626">其他 · Other</text>
      <text x="22" y="26" font-size="9" fill="#75777D">2% · ~¥0.1M</text>
    </g>
  </g>
  <text x="400" y="620" text-anchor="middle" font-family="var(--sans-tab)" font-size="10" fill="#75777D">MIX STRATEGY · 客房 30% + 餐饮 25% = 55% 核心, 康养/学院/会议 30% 高毛利</text>
</svg>

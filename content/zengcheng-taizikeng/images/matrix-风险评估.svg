<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700">
  <rect width="800" height="700" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="var(--sans-tab)" font-size="16" font-weight="700" fill="#0A1626" letter-spacing="0.16em">RISK MATRIX · 风险评估</text>
  <text x="400" y="62" text-anchor="middle" font-family="var(--sans-tab)" font-size="10" fill="#75777D">影响 × 可能性 · IMPACT × LIKELIHOOD</text>
  <line x1="120" y1="100" x2="120" y2="600" stroke="#0A1626"/>
  <line x1="120" y1="600" x2="700" y2="600" stroke="#0A1626"/>
  <!-- Y axis label -->
  <text x="80" y="350" text-anchor="middle" font-family="var(--sans-tab)" font-size="11" font-weight="600" fill="#0A1626" transform="rotate(-90, 80, 350)">影响 · IMPACT</text>
  <text x="730" y="350" text-anchor="middle" font-family="var(--sans-tab)" font-size="11" font-weight="600" fill="#0A1626" transform="rotate(-90, 730, 350)">可能性 · LIKELIHOOD</text>
  <!-- Quadrant fills -->
  <rect x="120" y="100" width="290" height="250" fill="#A88B52" fill-opacity="0.10" stroke="#A88B52" stroke-width="1.5"/>
  <rect x="410" y="100" width="290" height="250" fill="#C9A86B" fill-opacity="0.05" stroke="#C9A86B" stroke-width="1.5"/>
  <rect x="120" y="350" width="290" height="250" fill="#44474C" fill-opacity="0.04" stroke="#44474C" stroke-width="1.5"/>
  <rect x="410" y="350" width="290" height="250" fill="#C9A86B" fill-opacity="0.05" stroke="#C9A86B" stroke-width="1.5"/>
  <!-- Quadrant labels -->
  <text x="265" y="130" text-anchor="middle" font-family="var(--sans-tab)" font-size="12" font-weight="700" fill="#A88B52">高影响 · 高概率</text>
  <text x="265" y="148" text-anchor="middle" font-family="var(--sans-tab)" font-size="10" fill="#44474C">CRITICAL · 优先处理</text>
  <text x="555" y="130" text-anchor="middle" font-family="var(--sans-tab)" font-size="12" font-weight="600" fill="#44474C">高影响 · 低概率</text>
  <text x="555" y="148" text-anchor="middle" font-family="var(--sans-tab)" font-size="10" fill="#75777D">SERIOUS · 预案</text>
  <text x="265" y="380" text-anchor="middle" font-family="var(--sans-tab)" font-size="12" font-weight="600" fill="#44474C">低影响 · 高概率</text>
  <text x="265" y="398" text-anchor="middle" font-family="var(--sans-tab)" font-size="10" fill="#75777D">FREQUENT · 监控</text>
  <text x="555" y="380" text-anchor="middle" font-family="var(--sans-tab)" font-size="12" font-weight="600" fill="#44474C">低影响 · 低概率</text>
  <text x="555" y="398" text-anchor="middle" font-family="var(--sans-tab)" font-size="10" fill="#75777D">MINOR · 接受</text>
  <!-- Risk markers (4 risks) -->
  <g font-family="var(--sans-tab)">
    <g transform="translate(220, 200)">
      <circle r="22" fill="#A88B52"/>
      <text text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" y="4">R1</text>
      <text x="32" y="-2" font-size="10" font-weight="600" fill="#0A1626">合规边界</text>
      <text x="32" y="12" font-size="9" fill="#44474C">被识别为私人庄园</text>
    </g>
    <g transform="translate(335, 280)">
      <circle r="22" fill="#A88B52"/>
      <text text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" y="4">R2</text>
      <text x="32" y="-2" font-size="10" font-weight="600" fill="#0A1626">CAPEX</text>
      <text x="32" y="12" font-size="9" fill="#44474C">建设成本失控</text>
    </g>
    <g transform="translate(490, 220)">
      <circle r="22" fill="#C9A86B"/>
      <text text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" y="4">R3</text>
      <text x="32" y="-2" font-size="10" font-weight="600" fill="#0A1626">医疗资质</text>
      <text x="32" y="12" font-size="9" fill="#44474C">体检合规边界</text>
    </g>
    <g transform="translate(640, 320)">
      <circle r="22" fill="#44474C"/>
      <text text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" y="4">R4</text>
      <text x="-90" y="-2" font-size="10" font-weight="600" fill="#0A1626">品牌与关系</text>
      <text x="-90" y="12" font-size="9" fill="#44474C">沉香文化空心化</text>
    </g>
    <g transform="translate(380, 480)">
      <circle r="22" fill="#44474C"/>
      <text text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" y="4">R5</text>
      <text x="32" y="-2" font-size="10" font-weight="600" fill="#0A1626">团队能力</text>
      <text x="32" y="12" font-size="9" fill="#44474C">多业态运营复杂度</text>
    </g>
    <g transform="translate(630, 530)">
      <circle r="22" fill="#44474C"/>
      <text text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" y="4">R6</text>
      <text x="-90" y="-2" font-size="10" font-weight="600" fill="#0A1626">外部市场</text>
      <text x="-90" y="12" font-size="9" fill="#44474C">企业客户复购</text>
    </g>
  </g>
  <text x="400" y="680" text-anchor="middle" font-family="var(--sans-tab)" font-size="10" fill="#75777D">R1 合规边界 · R2 CAPEX · R3 医疗资质 · R4 品牌与关系 · R5 团队能力 · R6 外部市场</text>
</svg>
